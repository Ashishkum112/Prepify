services:
  - type: web
    name: dsa-pattern-tracker
    runtime: node
    plan: free
    buildCommand: npm ci && npm run clean && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: DEFAULT_REMINDER_EMAIL
        sync: false
